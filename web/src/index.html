<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APM Zoom - 商品查询</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>APM Zoom 商品查询</h1>
    <p class="subtitle">韩国服装批发平台 · 27,000+ 商品</p>
  </header>

  <main>
    <section class="search-section">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜索商品... 例如: 蓝色T恤、夹克、连衣裙" autofocus>
        <button id="searchBtn">搜索</button>
      </div>
      <div class="filters">
        <select id="categoryFilter">
          <option value="">全部品类</option>
        </select>
        <input type="number" id="minPrice" placeholder="最低价 (₩)">
        <input type="number" id="maxPrice" placeholder="最高价 (₩)">
        <select id="sellFilter">
          <option value="-1">全部状态</option>
          <option value="1">在售</option>
          <option value="0">下架</option>
        </select>
      </div>
    </section>

    <section class="stats-bar" id="statsBar">
      <span id="totalCount">加载中...</span>
    </section>

    <section class="goods-grid" id="goodsGrid"></section>

    <section class="pagination" id="pagination"></section>

    <!-- Detail Modal -->
    <div class="modal" id="detailModal">
      <div class="modal-content">
        <span class="modal-close" id="modalClose">&times;</span>
        <div id="detailBody"></div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
